name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t semantic-rag-qna:ci .

      - name: Run container and check health
        run: |
          docker run -d -p 8501:8501 --name rag-test semantic-rag-qna:ci
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8501/_stcore/health; then
              echo "App is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time"
          docker logs rag-test
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: docker logs rag-test || true

      - name: Clean up
        if: always()
        run: docker rm -f rag-test || true